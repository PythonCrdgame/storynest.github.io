<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryNest · e‑books for curious minds</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 1000px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 10px 25px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid white;
      color: white;
    }

    .btn-outline:hover {
      background: white;
      color: #667eea;
    }

    .btn-primary {
      background: white;
      color: #667eea;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .content {
      padding: 30px;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .book-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .book-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .book-title {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .book-author {
      color: #666;
      font-size: 14px;
    }

    .add-book-form {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    .message {
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📚 StoryNest</div>
      <div class="nav-buttons" id="navButtons">
        <a href="/login"><button class="btn btn-outline">Login</button></a>
        <a href="/signup"><button class="btn btn-primary">Sign Up</button></a>
      </div>
      <div class="user-info hidden" id="userInfo">
        <div class="user-avatar" id="userAvatar">📚</div>
        <span id="userName"></span>
        <button class="btn btn-outline" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="content">
      <h1>Welcome to Your Digital Library</h1>
      <p>Discover thousands of e-books for readers of all ages</p>
      
      <div id="message"></div>
      
      <div class="book-grid" id="booksGrid">
        <p>Loading books...</p>
      </div>

      <div class="add-book-form hidden" id="addBookForm">
        <h3>Add New Book</h3>
        <div class="form-group">
          <input type="text" id="bookTitle" placeholder="Book Title" required>
        </div>
        <div class="form-group">
          <input type="text" id="bookAuthor" placeholder="Author" required>
        </div>
        <div class="form-group">
          <input type="text" id="bookAge" placeholder="Age Range (e.g., 6+)" value="All ages">
        </div>
        <div class="form-group">
          <input type="text" id="bookGenre" placeholder="Genre (optional)">
        </div>
        <button class="btn-submit" onclick="addBook()">Add Book to Library</button>
      </div>
    </div>
  </div>

<script>
  let currentUser = null;

  // Check authentication status
  async function checkAuth() {
    try {
      const response = await fetch('/api/auth/me');
      if (response.ok) {
        const data = await response.json();
        currentUser = data.user;
        showAuthenticatedUI();
      } else {
        showUnauthenticatedUI();
      }
    } catch (error) {
      console.error('Auth check failed:', error);
      showUnauthenticatedUI();
    }
  }

  function showAuthenticatedUI() {
    document.getElementById('navButtons').classList.add('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('addBookForm').classList.remove('hidden');
    document.getElementById('userName').textContent = currentUser.fullName || currentUser.username;
    document.getElementById('userAvatar').textContent = currentUser.avatar || '📚';
  }

  function showUnauthenticatedUI() {
    document.getElementById('navButtons').classList.remove('hidden');
    document.getElementById('userInfo').classList.add('hidden');
    document.getElementById('addBookForm').classList.add('hidden');
  }

  // Load books
  async function loadBooks() {
    try {
      const response = await fetch('/api/books');
      if (!response.ok) throw new Error('Failed to fetch');
      const books = await response.json();
      displayBooks(books);
    } catch (error) {
      console.error('Error loading books:', error);
      document.getElementById('booksGrid').innerHTML = '<p>Error loading books. Please try again.</p>';
    }
  }

  function displayBooks(books) {
    const grid = document.getElementById('booksGrid');
    if (!books || books.length === 0) {
      grid.innerHTML = '<p>No books in the library yet. Add some books!</p>';
      return;
    }

    grid.innerHTML = books.map(book => `
      <div class="book-card">
        <div class="book-icon">${book.coverIcon || '📖'}</div>
        <div class="book-title">${escapeHtml(book.title)}</div>
        <div class="book-author">by ${escapeHtml(book.author)}</div>
        <div style="margin-top: 10px; font-size: 12px; color: #999;">${escapeHtml(book.age) || 'All ages'}</div>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      if (m === '"') return '&quot;';
      return m;
    });
  }

  // Add book
  async function addBook() {
    if (!currentUser) {
      alert('Please login to add books');
      return;
    }

    const title = document.getElementById('bookTitle').value;
    const author = document.getElementById('bookAuthor').value;
    const age = document.getElementById('bookAge').value;
    const genre = document.getElementById('bookGenre').value;

    if (!title || !author) {
      alert('Title and author are required');
      return;
    }

    try {
      const response = await fetch('/api/books', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, author, age, genre })
      });

      if (response.ok) {
        alert('Book added!');
        document.getElementById('bookTitle').value = '';
        document.getElementById('bookAuthor').value = '';
        loadBooks();
      } else {
        const error = await response.json();
        alert(error.error || 'Failed to add book');
      }
    } catch (error) {
      alert('Error adding book');
    }
  }

  // Logout
  async function logout() {
    try {
      await fetch('/api/auth/logout', { method: 'POST' });
      currentUser = null;
      showUnauthenticatedUI();
      window.location.href = '/';
    } catch (error) {
      console.error('Logout error:', error);
    }
  }

  // Initialize
  checkAuth();
  loadBooks();
</script>  

</body>
</html>
